services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crushpilot
      POSTGRES_USER: crushpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crushpilot -d crushpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://crushpilot@postgres:5432/crushpilot?sslmode=disable
      PGPASSWORD: ${POSTGRES_PASSWORD}
      DEMO_MODE: "false"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-deepseek}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      LONGXIA_BASE_URL: ${LONGXIA_BASE_URL}
      LONGXIA_API_KEY: ${LONGXIA_API_KEY}
      LONGXIA_MODEL: ${LONGXIA_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  postgres_data:
  backend_data:
